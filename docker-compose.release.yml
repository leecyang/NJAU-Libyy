services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: njau-libyy
    environment:
      TS_AUTHKEY: "${TS_AUTHKEY:-}"
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: "${TS_EXTRA_ARGS:---reset --accept-routes}"
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "${APP_BIND_ADDR:-127.0.0.1}:3000:3000"
    restart: unless-stopped

  app:
    image: "njau-libyy-app:${APP_IMAGE_TAG:-latest}"
    network_mode: "service:tailscale"
    init: true
    shm_size: "1gb"
    env_file:
      - .env
    environment:
      PORT: "3000"
      APP_VERSION: "${APP_IMAGE_TAG:-docker}"
      SQLITE_PATH: /data/njau-libyy.sqlite
      WEB_DIST_DIR: /app/apps/web/dist
      MIGRATIONS_DIR: /app/migrations
      OFFICIAL_NETWORK_MODE: tailscale-direct
      PLAYWRIGHT_PROFILE_DIR: /data/playwright-profiles
    volumes:
      - app-data:/data
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  app-data:
  tailscale-state:
