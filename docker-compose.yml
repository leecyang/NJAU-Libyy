services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: njau-libyy
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_USERSPACE: "false"
      TS_EXTRA_ARGS: "--reset --accept-routes=false --accept-dns=false${TS_EXTRA_ARGS:+ ${TS_EXTRA_ARGS}}"
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "${APP_BIND_ADDR:-127.0.0.1}:3000:3000"
    restart: unless-stopped

  app:
    build:
      context: .
    network_mode: "service:tailscale"
    init: true
    shm_size: "1gb"
    security_opt:
      - seccomp:./docker/playwright-seccomp.json
    env_file:
      - .env
    environment:
      PORT: "3000"
      SQLITE_PATH: /data/njau-libyy.sqlite
      WEB_DIST_DIR: /app/apps/web/dist
      MIGRATIONS_DIR: /app/migrations
      PLAYWRIGHT_PROFILE_DIR: /data/playwright-profiles
    volumes:
      - app-data:/data
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  app-data:
  tailscale-state:
