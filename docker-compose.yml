services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: njau-libyy
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:-}
      TS_STATE_DIR: /var/lib/tailscale
      TS_EXTRA_ARGS: ${TS_EXTRA_ARGS:---accept-routes --exit-node=100.87.36.34 --exit-node-allow-lan-access}
    volumes:
      - tailscale-state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  app:
    build:
      context: .
    network_mode: "service:tailscale"
    env_file:
      - .env
    environment:
      PORT: "3000"
      SQLITE_PATH: /data/njau-libyy.sqlite
      WEB_DIST_DIR: /app/apps/web/dist
      MIGRATIONS_DIR: /app/migrations
      OFFICIAL_NETWORK_MODE: tailscale-direct
    volumes:
      - app-data:/data
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  app-data:
  tailscale-state:
