name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run types:check
      - run: npm run typecheck
      - run: npm test
      - run: npx wrangler deploy --env staging --dry-run --outdir .wrangler-dry-run

  deploy-staging:
    needs: validate
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: staging
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      LIBYY_APP_SECRET: ${{ secrets.LIBYY_APP_SECRET }}
      NJAU_PROXY_TOKEN: ${{ secrets.NJAU_PROXY_TOKEN }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      PASSWORD_HASH_SECRET: ${{ secrets.PASSWORD_HASH_SECRET }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify deployment secrets
        run: |
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID LIBYY_APP_SECRET NJAU_PROXY_TOKEN TOKEN_ENCRYPTION_KEY SESSION_SECRET PASSWORD_HASH_SECRET SMTP_PASSWORD; do
            test -n "${!key}" || { echo "Missing required secret or variable: $key"; exit 1; }
          done
      - name: Apply staging migrations
        run: npx wrangler d1 migrations apply DB --env staging --remote
      - name: Deploy staging
        run: |
          trap 'rm -f .deploy-secrets.json' EXIT
          node -e "const fs=require('fs'); fs.writeFileSync('.deploy-secrets.json', JSON.stringify({LIBYY_APP_SECRET:process.env.LIBYY_APP_SECRET,NJAU_PROXY_TOKEN:process.env.NJAU_PROXY_TOKEN,TOKEN_ENCRYPTION_KEY:process.env.TOKEN_ENCRYPTION_KEY,SESSION_SECRET:process.env.SESSION_SECRET,PASSWORD_HASH_SECRET:process.env.PASSWORD_HASH_SECRET,SMTP_PASSWORD:process.env.SMTP_PASSWORD}))"
          npx wrangler deploy --env staging --secrets-file .deploy-secrets.json
      - name: Smoke test staging
        run: |
          for attempt in 1 2 3 4 5 6; do
            curl --fail --silent --show-error https://staging-libyy.way2api.fun/api/v1/health && exit 0
            sleep 10
          done
          exit 1

  deploy-production:
    needs: deploy-staging
    if: vars.DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      LIBYY_APP_SECRET: ${{ secrets.LIBYY_APP_SECRET }}
      NJAU_PROXY_TOKEN: ${{ secrets.NJAU_PROXY_TOKEN }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      PASSWORD_HASH_SECRET: ${{ secrets.PASSWORD_HASH_SECRET }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify deployment secrets
        run: |
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID LIBYY_APP_SECRET NJAU_PROXY_TOKEN TOKEN_ENCRYPTION_KEY SESSION_SECRET PASSWORD_HASH_SECRET SMTP_PASSWORD; do
            test -n "${!key}" || { echo "Missing required secret or variable: $key"; exit 1; }
          done
      - name: Apply production migrations
        run: npx wrangler d1 migrations apply DB --env production --remote
      - name: Deploy production
        run: |
          trap 'rm -f .deploy-secrets.json' EXIT
          node -e "const fs=require('fs'); fs.writeFileSync('.deploy-secrets.json', JSON.stringify({LIBYY_APP_SECRET:process.env.LIBYY_APP_SECRET,NJAU_PROXY_TOKEN:process.env.NJAU_PROXY_TOKEN,TOKEN_ENCRYPTION_KEY:process.env.TOKEN_ENCRYPTION_KEY,SESSION_SECRET:process.env.SESSION_SECRET,PASSWORD_HASH_SECRET:process.env.PASSWORD_HASH_SECRET,SMTP_PASSWORD:process.env.SMTP_PASSWORD}))"
          npx wrangler deploy --env production --secrets-file .deploy-secrets.json
      - name: Smoke test production
        run: |
          for attempt in 1 2 3 4 5 6; do
            curl --fail --silent --show-error https://libyy.way2api.fun/api/v1/health && exit 0
            sleep 10
          done
          exit 1
