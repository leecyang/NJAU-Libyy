name: check-and-release

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  release-compose:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    env:
      R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
      R2_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_R2_ACCOUNT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          version="${GITHUB_SHA::12}"
          bucket="${R2_BUCKET:-cloud.way2api.fun}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "bucket=$bucket" >> "$GITHUB_OUTPUT"
          echo "created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --target runtime \
            --tag "njau-libyy-app:${{ steps.meta.outputs.version }}" \
            --tag "njau-libyy-app:latest" \
            .

      - name: Create compose release payload
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.version }}"
          mkdir -p release
          docker save "njau-libyy-app:$version" "njau-libyy-app:latest" | gzip -9 > "release/njau-libyy-app-$version.tar.gz"
          cp docker-compose.release.yml release/docker-compose.yml
          cp docker/playwright-seccomp.json release/playwright-seccomp.json
          cp .env.example release/env.example
          cat > release/manifest.json << EOF
          {
            "name": "NJAU-Libyy",
            "version": "$version",
            "commit": "$GITHUB_SHA",
            "createdAt": "${{ steps.meta.outputs.created_at }}",
            "files": {
              "image": "njau-libyy-app-$version.tar.gz",
              "compose": "docker-compose.yml",
              "seccomp": "playwright-seccomp.json",
              "envExample": "env.example"
            }
          }
          EOF

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: njau-libyy-compose-${{ steps.meta.outputs.version }}
          path: release/

      - name: Install AWS CLI
        run: |
          python -m pip install --user awscli
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Upload release to Cloudflare R2
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${R2_ACCOUNT_ID:-}" ] || [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "Missing R2 secrets. Configure CLOUDFLARE_R2_ACCOUNT_ID, CLOUDFLARE_R2_ACCESS_KEY_ID, CLOUDFLARE_R2_SECRET_ACCESS_KEY." >&2
            exit 1
          fi
          endpoint="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          bucket="${{ steps.meta.outputs.bucket }}"
          version="${{ steps.meta.outputs.version }}"
          aws s3 sync release "s3://${bucket}/NJAU/${version}" --endpoint-url "$endpoint" --delete
          aws s3 sync release "s3://${bucket}/NJAU/latest" --endpoint-url "$endpoint" --delete
