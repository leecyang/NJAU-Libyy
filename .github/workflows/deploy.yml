name: deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      LIBYY_APP_SECRET: ${{ secrets.LIBYY_APP_SECRET }}
      NJAU_PROXY_TOKEN: ${{ secrets.NJAU_PROXY_TOKEN }}
      TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      PASSWORD_HASH_SECRET: ${{ secrets.PASSWORD_HASH_SECRET }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Verify deployment secrets
        run: |
          for key in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID LIBYY_APP_SECRET NJAU_PROXY_TOKEN TOKEN_ENCRYPTION_KEY SESSION_SECRET PASSWORD_HASH_SECRET SMTP_PASSWORD; do
            test -n "${!key}" || { echo "Missing required secret or variable: $key"; exit 1; }
          done
      - name: Apply production migrations
        run: npx wrangler d1 migrations apply DB --env production --remote
      - name: Deploy production
        run: |
          trap 'rm -f .deploy-secrets.json' EXIT
          node -e "const fs=require('fs'); fs.writeFileSync('.deploy-secrets.json', JSON.stringify({LIBYY_APP_SECRET:process.env.LIBYY_APP_SECRET,NJAU_PROXY_TOKEN:process.env.NJAU_PROXY_TOKEN,TOKEN_ENCRYPTION_KEY:process.env.TOKEN_ENCRYPTION_KEY,SESSION_SECRET:process.env.SESSION_SECRET,PASSWORD_HASH_SECRET:process.env.PASSWORD_HASH_SECRET,SMTP_PASSWORD:process.env.SMTP_PASSWORD}))"
          npx wrangler deploy --env production --secrets-file .deploy-secrets.json
